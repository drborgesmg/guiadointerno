<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Médico — Receitas & Evoluções</title>
<style>
  :root {
    --bg: #f7f8fa; --card: #ffffff; --border: #e2e6ea;
    --primary: #1a5c96; --primary-light: #e8f0fb;
    --accent: #0d9488; --accent-light: #e6f7f5;
    --text: #1a202c; --muted: #64748b;
    --shadow: 0 1px 4px rgba(0,0,0,0.08); --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
  header { background: var(--primary); color: white; padding: 18px 24px; display: flex; align-items: center; gap: 14px; }
  header h1 { font-size: 1.25rem; font-weight: 700; }
  .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); padding: 0 24px; gap: 4px; overflow-x: auto; }
  .tab { padding: 13px 16px; cursor: pointer; border: none; background: none; font-size: 0.88rem; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; white-space: nowrap; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; padding: 20px 24px; max-width: 960px; margin: 0 auto; }
  .tab-content.active { display: block; }
  .search-box { background: white; border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
  .search-box label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .search-row { display: flex; gap: 10px; }
  .search-input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.15s; }
  .search-input:focus { border-color: var(--primary); }
  .clear-btn { padding: 10px 14px; background: #f1f5f9; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
  .disease-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .disease-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; user-select: none; }
  .disease-header:hover { background: var(--primary-light); }
  .disease-name { font-weight: 700; font-size: 0.97rem; color: var(--primary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .category-tag { font-size: 0.7rem; font-weight: 600; background: var(--primary-light); color: var(--primary); padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .toggle-icon { font-size: 1rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
  .disease-card.open .toggle-icon { transform: rotate(180deg); }
  .disease-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .disease-card.open .disease-body { display: block; }
  .presc-section { margin-top: 13px; }
  .presc-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .presc-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .drug-item { background: #fafbfc; border: 1px solid var(--border); border-radius: 7px; padding: 9px 13px; margin-bottom: 7px; }
  .drug-name { font-weight: 700; color: var(--text); font-size: 0.93rem; }
  .drug-dose { color: var(--muted); font-size: 0.86rem; margin-top: 2px; }
  .drug-obs { color: #b45309; font-size: 0.81rem; margin-top: 3px; font-style: italic; }
  .or-divider { text-align: center; font-size: 0.75rem; font-weight: 700; color: var(--muted); margin: 3px 0; letter-spacing: 1px; }
  .obs-box { background: #fffbeb; border-left: 4px solid #f59e0b; border-radius: 6px; padding: 9px 13px; margin-top: 9px; font-size: 0.84rem; color: #78350f; white-space: pre-line; }
  .orient-box { background: var(--accent-light); border-left: 4px solid var(--accent); border-radius: 6px; padding: 9px 13px; margin-top: 9px; font-size: 0.84rem; }
  .orient-box ul { padding-left: 16px; }
  .orient-box li { margin-bottom: 3px; }
  .alert-box { background: #fef2f2; border-left: 4px solid #dc2626; border-radius: 6px; padding: 9px 13px; margin-top: 9px; font-size: 0.84rem; color: #7f1d1d; white-space: pre-line; }
  .copy-btn { padding: 4px 11px; font-size: 0.75rem; background: var(--primary-light); color: var(--primary); border: 1px solid #bcd0f0; border-radius: 6px; cursor: pointer; font-weight: 600; flex-shrink: 0; }
  .copy-btn:hover { background: var(--primary); color: white; }
  .stats-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-pill { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; color: var(--muted); box-shadow: var(--shadow); }
  .stat-pill strong { color: var(--primary); }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 0.78rem; cursor: pointer; color: var(--muted); font-weight: 500; transition: all 0.12s; }
  .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .evolucao-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .evolucao-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; user-select: none; }
  .evolucao-header:hover { background: var(--accent-light); }
  .evolucao-name { font-weight: 700; color: var(--accent); font-size: 0.97rem; }
  .evolucao-body { display: none; padding: 14px 16px; border-top: 1px solid var(--border); }
  .evolucao-card.open .evolucao-body { display: block; }
  .evolucao-card.open .toggle-icon { transform: rotate(180deg); }
  .evolucao-text { white-space: pre-line; font-family: 'Courier New', monospace; font-size: 0.83rem; line-height: 1.7; background: #fafbfc; border: 1px solid var(--border); border-radius: 8px; padding: 13px; }
  .copy-all-btn { display: inline-block; margin-top: 10px; padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 0.83rem; }
  .no-results { text-align: center; padding: 40px 20px; color: var(--muted); }
  .no-results span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
  @media (max-width: 600px) {
    .tab { padding: 10px 10px; font-size: 0.78rem; }
    .tab-content { padding: 12px 12px; }
    header h1 { font-size: 1rem; }
  }
</style>
</head>
<body>
<header><span>🩺</span><h1>Guia Médico — Receitas &amp; Evoluções</h1></header>
<div class="tabs">
  <button class="tab active" onclick="showTab('receitas',this)">💊 Receitas por Doença</button>
  <button class="tab" onclick="showTab('medicacoes',this)">🔍 Busca por Medicação</button>
  <button class="tab" onclick="showTab('evolucoes',this)">📋 Evoluções</button>
</div>

<div id="tab-receitas" class="tab-content active">
  <div class="search-box">
    <label>🔍 Buscar por doença</label>
    <div class="search-row">
      <input type="text" class="search-input" id="search-doenca" placeholder="Ex: dengue, cefaleia, ITU, sepse, FA..." oninput="filterDiseases()">
      <button class="clear-btn" onclick="clearSearch('search-doenca')">✕</button>
    </div>
  </div>
  <div class="filter-row" id="category-filters">
    <button class="filter-btn active" onclick="filterCategory('all',this)">Todas</button>
    <button class="filter-btn" onclick="filterCategory('Cardio',this)">Cardio</button>
    <button class="filter-btn" onclick="filterCategory('Neuro',this)">Neuro</button>
    <button class="filter-btn" onclick="filterCategory('Pneumo',this)">Pneumo</button>
    <button class="filter-btn" onclick="filterCategory('Gastro',this)">Gastro</button>
    <button class="filter-btn" onclick="filterCategory('Nefro',this)">Nefro</button>
    <button class="filter-btn" onclick="filterCategory('Infecto',this)">Infecto</button>
    <button class="filter-btn" onclick="filterCategory('Pele',this)">Pele</button>
    <button class="filter-btn" onclick="filterCategory('Ortopedia',this)">Ortopedia</button>
    <button class="filter-btn" onclick="filterCategory('Gineco',this)">Gineco</button>
    <button class="filter-btn" onclick="filterCategory('Psiquiatria',this)">Psiquiatria</button>
    <button class="filter-btn" onclick="filterCategory('Pediatria',this)">Pediatria</button>
    <button class="filter-btn" onclick="filterCategory('Emergência',this)">Emergência</button>
    <button class="filter-btn" onclick="filterCategory('Outros',this)">Outros</button>
  </div>
  <div class="stats-bar"><div class="stat-pill">Total: <strong id="count-visible">0</strong> doenças</div></div>
  <div id="diseases-list"></div>
  <div id="no-results" class="no-results" style="display:none"><span>🔎</span>Nenhuma doença encontrada.</div>
</div>

<div id="tab-medicacoes" class="tab-content">
  <div class="search-box">
    <label>💊 Buscar por nome da medicação</label>
    <div class="search-row">
      <input type="text" class="search-input" id="search-med" placeholder="Ex: amoxicilina, dipirona, metronidazol, noradrenalina..." oninput="filterByMed()">
      <button class="clear-btn" onclick="clearSearch('search-med')">✕</button>
    </div>
  </div>
  <div id="med-results"></div>
  <div id="med-no-results" class="no-results" style="display:none"><span>💊</span>Nenhuma receita encontrada.</div>
  <div id="med-empty" class="no-results"><span>🔍</span>Digite o nome de um medicamento para buscar.</div>
</div>

<div id="tab-evolucoes" class="tab-content">
  <div class="search-box">
    <label>📋 Modelos de Evolução — clique para expandir e copiar</label>
    <p style="font-size:0.84rem;color:var(--muted);margin-top:4px;">Adapte conforme o quadro clínico do paciente.</p>
  </div>
  <div id="evolucoes-list"></div>
</div>

// ===== RENDER =====
let activeCategory = 'all';

function buildCard(d,i){
  let sectionsHTML='';
  for(const s of d.sections){
    if(s.type==='obs'){sectionsHTML+=`<div class="presc-section"><div class="presc-label">${s.label}</div><div class="obs-box">${s.text.replace(/\n/g,'<br>')}</div></div>`;continue;}
    if(s.type==='alert'){sectionsHTML+=`<div class="presc-section"><div class="presc-label">${s.label}</div><div class="alert-box">${s.text.replace(/\n/g,'<br>')}</div></div>`;continue;}
    if(s.type==='orient'){sectionsHTML+=`<div class="presc-section"><div class="presc-label">${s.label}</div><div class="orient-box"><ul>${s.items.map(it=>`<li>${it}</li>`).join('')}</ul></div></div>`;continue;}
    let drugsHTML='';
    for(const dr of s.drugs){
      if(dr.or){drugsHTML+=`<div class="or-divider">— OU —</div>`;continue;}
      drugsHTML+=`<div class="drug-item"><div class="drug-name">${dr.name}${dr.qty?` <span style="font-weight:400;color:var(--muted);font-size:0.82rem;">— ${dr.qty}</span>`:''}</div><div class="drug-dose">${dr.dose}</div>${dr.obs?`<div class="drug-obs">⚠ ${dr.obs}</div>`:''}</div>`;
    }
    sectionsHTML+=`<div class="presc-section"><div class="presc-label">${s.label}</div>${drugsHTML}</div>`;
  }
  return `<div class="disease-card" id="card-${i}" data-name="${d.name.toLowerCase()}" data-category="${d.category}">
    <div class="disease-header" onclick="toggleCard('card-${i}')">
      <div class="disease-name"><span class="category-tag">${d.category}</span>${d.name}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="copy-btn" onclick="event.stopPropagation();copyCard(${i})">📋 Copiar</button>
        <span class="toggle-icon">▼</span>
      </div>
    </div>
    <div class="disease-body">${sectionsHTML}</div>
  </div>`;
}

function renderDiseases(list){
  const c=document.getElementById('diseases-list'),nr=document.getElementById('no-results');
  document.getElementById('count-visible').textContent=list.length;
  if(!list.length){c.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  c.innerHTML=list.map((d,i)=>buildCard(d,i)).join('');
}

function toggleCard(id){document.getElementById(id).classList.toggle('open');}

function copyCard(idx){
  const d=diseases[idx];
  let txt=`=== ${d.name.toUpperCase()} ===\n\n`;
  for(const s of d.sections){
    txt+=`--- ${s.label} ---\n`;
    if(s.type==='obs'||s.type==='alert'){txt+=s.text+'\n\n';continue;}
    if(s.type==='orient'){txt+=s.items.map(it=>`• ${it}`).join('\n')+'\n\n';continue;}
    for(const dr of s.drugs){
      if(dr.or){txt+='OU\n';continue;}
      txt+=`${dr.name}${dr.qty?' — '+dr.qty:''}\n${dr.dose}\n${dr.obs?'⚠ '+dr.obs+'\n':''}`;
    }
    txt+='\n';
  }
  navigator.clipboard.writeText(txt.trim()).then(()=>{
    const btns=document.querySelectorAll('.copy-btn');
    if(btns[idx]){btns[idx].textContent='✓ Copiado!';setTimeout(()=>btns[idx].textContent='📋 Copiar',2000);}
  });
}

function filterDiseases(){
  const q=document.getElementById('search-doenca').value.toLowerCase().trim();
  let f=diseases;
  if(activeCategory!=='all') f=f.filter(d=>d.category===activeCategory);
  if(q) f=f.filter(d=>d.name.toLowerCase().includes(q));
  renderDiseases(f);
}

function filterCategory(cat,btn){
  activeCategory=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterDiseases();
}

function clearSearch(id){
  document.getElementById(id).value='';
  if(id==='search-doenca') filterDiseases();
  if(id==='search-med') filterByMed();
}

function filterByMed(){
  const q=document.getElementById('search-med').value.toLowerCase().trim();
  const c=document.getElementById('med-results'),nr=document.getElementById('med-no-results'),em=document.getElementById('med-empty');
  if(!q){c.innerHTML='';nr.style.display='none';em.style.display='block';return;}
  em.style.display='none';
  const results=[];
  for(const d of diseases){
    for(const s of d.sections){
      if(!s.drugs) continue;
      for(const dr of s.drugs){
        if(dr.or) continue;
        if(dr.name.toLowerCase().includes(q)) results.push({disease:d.name,category:d.category,section:s.label,drug:dr});
      }
    }
  }
  if(!results.length){c.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  c.innerHTML=results.map(r=>`<div class="disease-card" style="margin-bottom:10px"><div style="padding:11px 14px"><div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${r.category} › ${r.disease} › ${r.section}</div><div class="drug-item" style="margin:0"><div class="drug-name">${r.drug.name}${r.drug.qty?` <span style="font-weight:400;color:var(--muted);font-size:0.82rem;">— ${r.drug.qty}</span>`:''}</div><div class="drug-dose">${r.drug.dose}</div>${r.drug.obs?`<div class="drug-obs">⚠ ${r.drug.obs}</div>`:''}</div></div></div>`).join('');
}

function renderEvolucoes(){
  document.getElementById('evolucoes-list').innerHTML=evolucoes.map((e,i)=>`<div class="evolucao-card" id="ev-${i}"><div class="evolucao-header" onclick="toggleEvol('ev-${i}')"><div class="evolucao-name">📋 ${e.name}</div><span class="toggle-icon" style="color:var(--muted)">▼</span></div><div class="evolucao-body"><div class="evolucao-text">${e.text}</div><button class="copy-all-btn" onclick="navigator.clipboard.writeText(${JSON.stringify(e.text)}).then(()=>{this.textContent='✓ Copiado!';setTimeout(()=>this.textContent='📋 Copiar evolução',2000)})">📋 Copiar evolução</button></div></div>`).join('');
}

function toggleEvol(id){document.getElementById(id).classList.toggle('open');}

function showTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
}

renderDiseases(diseases);
renderEvolucoes();
</script>
</body>
</html>
